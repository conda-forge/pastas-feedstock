{% set name = "pastas" %}
{% set version = "1.14.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f1aea7cd9efd0325c61e6439bbaf18d3bf464ac2181b30121e916a615052c1f2

build:
  number: 0
  noarch: python
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vvv '

requirements:
  host:
    - numpy >=1.10
    - pip
    - python {{ python_min }}
  run:
    - matplotlib-base >=2.0
    - {{ pin_compatible('numpy') }}
    - pandas >=0.22
    - python >={{ python_min }}
    - scipy >=1.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - pastas

about:
  home: https://github.com/pastas/pastas
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Python Applied System TimeSeries Analysis Software
  doc_url: http://pastas.readthedocs.io
  dev_url: https://github.com/pastas/pastas

extra:
  recipe-maintainers:
    - jentjr
